<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Download Tiger Teams</title>

  <style>
    body {
      background-color: black;
      color: gold;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }

    a {
      color: gold;
      text-decoration: none;
      border: 1px solid gold;
      padding: 10px 20px;
      border-radius: 8px;
      display: inline-block;
      margin: 10px;
    }

    a:hover {
      background-color: gold;
      color: black;
    }
  </style>

  <script>
    function redirectUser() {
      const ua = navigator.userAgent || navigator.vendor || window.opera;

      const appStoreUrl = "https://apps.apple.com/us/app/tiger-teams/id6615087707";
      const playStoreUrl = "https://play.google.com/store/apps/details?id=com.fnoex.fan.hscasanluisobispo&hl=en_US";

      if (/android/i.test(ua)) {
        window.location.replace(playStoreUrl);
      } else if (/iPad|iPhone|iPod/.test(ua)) {
        window.location.replace(appStoreUrl);
      }
    }

    window.onload = function () {
      setTimeout(redirectUser, 300);
    };
  </script>
</head>

<body>
  <h1>Download Tiger Teams</h1>
  <p>Redirecting you to the app store...</p>

  <p>If nothing happens, choose your device:</p>

  <a href="https://apps.apple.com/us/app/tiger-teams/id6615087707">iPhone</a>
  <a href="https://play.google.com/store/apps/details?id=com.fnoex.fan.hscasanluisobispo&hl=en_US">Android</a>
</body>
</html>
